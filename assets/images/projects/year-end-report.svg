<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 600" role="img" aria-label="YEAR END REVIEW">

  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#312e81" />
      <stop offset="100%" stop-color="#1d4ed8" />
    </linearGradient>
    <radialGradient id="spot" cx="20%" cy="15%">
      <stop offset="0%" stop-color="rgba(255,255,255,0.22)" />
      <stop offset="100%" stop-color="rgba(255,255,255,0)" />
    </radialGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#f59e0b" stop-opacity="0.95" />
      <stop offset="100%" stop-color="#f59e0b" stop-opacity="0.45" />
    </linearGradient>
    <filter id="grain" x="-10%" y="-10%" width="120%" height="120%">
      <feTurbulence type="fractalNoise" baseFrequency="0.7" numOctaves="2" seed="7" />
      <feColorMatrix type="saturate" values="0" />
      <feComponentTransfer>
        <feFuncA type="table" tableValues="0 0 0.055" />
      </feComponentTransfer>
    </filter>
  </defs>
  <rect width="960" height="600" fill="url(#bg)" />
  <rect width="960" height="600" fill="url(#spot)" />
  <rect width="960" height="600" filter="url(#grain)" />
  <rect x="18" y="18" width="924" height="564" rx="26" fill="none" stroke="rgba(255,255,255,0.24)" />
  <rect x="18" y="18" width="924" height="8" rx="4" fill="url(#accent)" />
  

  <text x="46" y="74" fill="rgba(255,255,255,0.95)" font-size="30" font-family="Montserrat, Segoe UI, sans-serif" font-weight="700" letter-spacing="1.2">YEAR END REVIEW</text>
  <text x="46" y="106" fill="rgba(255,255,255,0.72)" font-size="16" font-family="Segoe UI, sans-serif" letter-spacing="1">strategic timeline</text>
  

  <g>
    <line x1="118" y1="442" x2="842" y2="442" stroke="rgba(255,255,255,0.26)" stroke-width="3" />
    <path d="M118 442 C 212 364, 286 392, 362 334 S 538 256, 642 218 S 760 170, 842 154" fill="none" stroke="rgba(245,179,35,0.92)" stroke-width="4" />
    <circle cx="118" cy="442" r="11" fill="rgba(245,179,35,0.95)" />
    <circle cx="362" cy="334" r="9" fill="rgba(255,255,255,0.8)" />
    <circle cx="642" cy="218" r="9" fill="rgba(255,255,255,0.8)" />
    <circle cx="842" cy="154" r="11" fill="rgba(245,179,35,0.95)" />
  </g>
</svg>
