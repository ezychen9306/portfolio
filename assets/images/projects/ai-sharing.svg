<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 600" role="img" aria-label="AI INTERNAL SHARING">

  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#312e81" />
      <stop offset="100%" stop-color="#4338ca" />
    </linearGradient>
    <radialGradient id="spot" cx="20%" cy="15%">
      <stop offset="0%" stop-color="rgba(255,255,255,0.22)" />
      <stop offset="100%" stop-color="rgba(255,255,255,0)" />
    </radialGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#a78bfa" stop-opacity="0.95" />
      <stop offset="100%" stop-color="#a78bfa" stop-opacity="0.45" />
    </linearGradient>
    <filter id="grain" x="-10%" y="-10%" width="120%" height="120%">
      <feTurbulence type="fractalNoise" baseFrequency="0.7" numOctaves="2" seed="7" />
      <feColorMatrix type="saturate" values="0" />
      <feComponentTransfer>
        <feFuncA type="table" tableValues="0 0 0.055" />
      </feComponentTransfer>
    </filter>
  </defs>
  <rect width="960" height="600" fill="url(#bg)" />
  <rect width="960" height="600" fill="url(#spot)" />
  <rect width="960" height="600" filter="url(#grain)" />
  <rect x="18" y="18" width="924" height="564" rx="26" fill="none" stroke="rgba(255,255,255,0.24)" />
  <rect x="18" y="18" width="924" height="8" rx="4" fill="url(#accent)" />
  

  <text x="46" y="74" fill="rgba(255,255,255,0.95)" font-size="30" font-family="Montserrat, Segoe UI, sans-serif" font-weight="700" letter-spacing="1.2">AI INTERNAL SHARING</text>
  <text x="46" y="106" fill="rgba(255,255,255,0.72)" font-size="16" font-family="Segoe UI, sans-serif" letter-spacing="1">team resonance</text>
  

  <g>
    <circle cx="486" cy="316" r="42" fill="rgba(167,139,250,0.85)" />
    <circle cx="486" cy="316" r="92" fill="none" stroke="rgba(167,139,250,0.55)" stroke-width="3" />
    <circle cx="486" cy="316" r="146" fill="none" stroke="rgba(167,139,250,0.35)" stroke-width="3" />
    <circle cx="486" cy="316" r="196" fill="none" stroke="rgba(167,139,250,0.22)" stroke-width="3" />
    <path d="M192 314 H782" stroke="rgba(255,255,255,0.25)" stroke-width="2" />
    <path d="M486 122 V512" stroke="rgba(255,255,255,0.2)" stroke-width="2" />
  </g>
</svg>
