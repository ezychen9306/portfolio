<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>团队 AI 知识分享 · 效率 +30%</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/remixicon@4.1.0/fonts/remixicon.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
:root{--bg:#f7f4ef;--card:#fff;--primary:#6b8e9f;--accent:#c9a227;--text:#4a5568;--muted:#718096;--border:#e8e4dc;--shadow:0 2px 8px rgba(0,0,0,.06)}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
nav{background:#fff;border-bottom:1px solid #e8e4dc;padding:.75rem 1.5rem;display:flex;align-items:center;gap:1rem;position:sticky;top:0;z-index:10}
nav a{display:inline-flex;align-items:center;gap:.4rem;color:#6b8e9f;text-decoration:none;font-weight:600;font-size:.9rem;padding:.3rem .7rem;border-radius:6px;border:1px solid #e8e4dc;transition:background .2s}
nav a:hover{background:#f7f4ef}
nav span{color:#718096;font-size:.9rem}
.page{padding:1.5rem;max-width:960px;margin:0 auto}
.header{margin-bottom:1.5rem}
.header h1{font-size:1.35rem;font-weight:700;color:var(--text);display:flex;align-items:center;gap:.5rem}
.header p{font-size:.83rem;color:var(--muted);margin-top:.3rem}
.kpi-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:1rem;margin-bottom:1.25rem}
.kpi-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:1.2rem;box-shadow:var(--shadow);display:flex;align-items:center;gap:1rem}
.kpi-icon{width:44px;height:44px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:1.3rem;flex-shrink:0}
.kpi-icon.blue{background:#e8f4f8;color:#6b8e9f}
.kpi-icon.gold{background:#fef9e7;color:#c9a227}
.kpi-label{font-size:.75rem;color:var(--muted);margin-bottom:.2rem}
.kpi-value{font-size:1.7rem;font-weight:700;line-height:1.1}
.kpi-value span{font-size:.95rem;font-weight:400}
.color-accent{color:var(--accent)}
.color-primary{color:var(--primary)}
.kpi-badge{display:inline-block;font-size:.7rem;padding:.15rem .4rem;border-radius:4px;font-weight:600;margin-top:.25rem}
.badge-up{background:#fef3c7;color:#92400e}
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:1rem}
.section{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:1.2rem;box-shadow:var(--shadow)}
.section-title{font-size:.88rem;font-weight:600;color:var(--text);margin-bottom:.9rem;display:flex;align-items:center;gap:.4rem}
.section-title i{color:var(--primary)}
.chart-wrap{position:relative;height:200px}
@media(max-width:680px){.kpi-grid{grid-template-columns:1fr}.two-col{grid-template-columns:1fr}}
</style>
<script>if(window.parent!==window)document.documentElement.classList.add("in-iframe");</script>
<style>.in-iframe nav{display:none!important;}</style>
<meta name="description" content="团队赋能 · 效率 +30%+">
<meta property="og:title" content="团队 AI 知识分享 · 效率 +30% · 演示" />
<meta property="og:description" content="团队赋能 · 效率 +30%+" />
<meta property="og:type" content="website" />
<meta property="og:image" content="../../screenshot.png" />
<meta property="og:url" content="https://ezychen9306.github.io/portfolio/" />
<link rel="apple-touch-icon" sizes="180x180" href="../../assets/icons/apple-touch-icon.png">
<link rel="icon" type="image/png" sizes="32x32" href="../../assets/icons/favicon-32x32.png">
<link rel="icon" type="image/png" sizes="16x16" href="../../assets/icons/favicon-16x16.png">
<link rel="manifest" href="../../assets/icons/site.webmanifest">
</head>
<body>
<nav>
  <a href="../../index.html#portfolio" onclick="if(window.parent!==window){window.parent.closeModal();return false;}"><i class="ri-arrow-left-line"></i> 返回</a>
  <span>团队 AI 知识分享 · 效率 +30%</span>
</nav>
<div class="page">
  <div class="header">
    <h1><i class="ri-brain-line" style="color:var(--primary)"></i> 团队 AI 知识分享</h1>
    <p>效率 +30% &nbsp;·&nbsp; 持续学习，共建 AI 实践社区 &nbsp;·&nbsp; 累计 7 周</p>
  </div>

  <div class="kpi-grid">
    <div class="kpi-card">
      <div class="kpi-icon gold"><i class="ri-group-line"></i></div>
      <div>
        <div class="kpi-label">最新参与人数</div>
        <div class="kpi-value color-accent">34<span>人</span></div>
        <span class="kpi-badge badge-up">↑ 21.4% 较首周</span>
      </div>
    </div>
    <div class="kpi-card">
      <div class="kpi-icon blue"><i class="ri-book-open-line"></i></div>
      <div>
        <div class="kpi-label">分享主题数</div>
        <div class="kpi-value color-primary">4<span>个</span></div>
        <span class="kpi-badge" style="background:#e8f4f8;color:#4a7a8a">RAG · Agent · Prompt · MCP</span>
      </div>
    </div>
  </div>

  <div class="two-col">
    <div class="section">
      <div class="section-title"><i class="ri-line-chart-line"></i> 7 周参与人数趋势</div>
      <div class="chart-wrap"><canvas id="trendChart"></canvas></div>
    </div>
    <div class="section">
      <div class="section-title"><i class="ri-bar-chart-horizontal-line"></i> 主题热度排行</div>
      <div class="chart-wrap"><canvas id="topicChart"></canvas></div>
    </div>
  </div>
</div>

<script>
const DATA = {
  trend:[12,18,20,25,21,28,34],
  topics:[{name:"RAG",v:34},{name:"Agent",v:28},{name:"Prompt",v:22},{name:"MCP",v:16}]
};

document.addEventListener('DOMContentLoaded',()=>{
  // Trend
  const ctx1 = document.getElementById('trendChart').getContext('2d');
  const grad = ctx1.createLinearGradient(0,0,0,180);
  grad.addColorStop(0,'rgba(107,142,159,.22)');
  grad.addColorStop(1,'rgba(107,142,159,.02)');
  new Chart(ctx1,{
    type:'line',
    data:{
      labels:['W1','W2','W3','W4','W5','W6','W7'],
      datasets:[{
        label:'参与人数',
        data:DATA.trend,
        borderColor:'#6b8e9f',
        backgroundColor:grad,
        borderWidth:2.5,
        pointRadius:5,
        pointBackgroundColor:'#6b8e9f',
        fill:true,
        tension:.4
      }]
    },
    options:{
      responsive:true,maintainAspectRatio:false,
      plugins:{legend:{display:false}},
      scales:{
        x:{grid:{color:'#f0ede8'},ticks:{font:{size:11}}},
        y:{grid:{color:'#f0ede8'},ticks:{font:{size:11}},min:0,max:40}
      }
    }
  });

  // Topics bar
  const ctx2 = document.getElementById('topicChart').getContext('2d');
  new Chart(ctx2,{
    type:'bar',
    data:{
      labels:DATA.topics.map(t=>t.name),
      datasets:[{
        label:'热度',
        data:DATA.topics.map(t=>t.v),
        backgroundColor:['#c9a227','#6b8e9f','#e0c875','#8fa9b5'],
        borderRadius:6,
        borderSkipped:false
      }]
    },
    options:{
      indexAxis:'y',
      responsive:true,maintainAspectRatio:false,
      plugins:{legend:{display:false}},
      scales:{
        x:{grid:{color:'#f0ede8'},ticks:{font:{size:11}}},
        y:{grid:{display:false},ticks:{font:{size:11}}}
      }
    }
  });
});
</script>
</body>
</html>
