<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>客群分层策略 · 63.2万客户</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/remixicon@4.1.0/fonts/remixicon.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
:root{--bg:#f7f4ef;--card:#fff;--primary:#6b8e9f;--accent:#c9a227;--text:#4a5568;--muted:#718096;--border:#e8e4dc;--shadow:0 2px 8px rgba(0,0,0,.06)}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
nav{background:#fff;border-bottom:1px solid #e8e4dc;padding:.75rem 1.5rem;display:flex;align-items:center;gap:1rem;position:sticky;top:0;z-index:10}
nav a{display:inline-flex;align-items:center;gap:.4rem;color:#6b8e9f;text-decoration:none;font-weight:600;font-size:.9rem;padding:.3rem .7rem;border-radius:6px;border:1px solid #e8e4dc;transition:background .2s}
nav a:hover{background:#f7f4ef}
nav span{color:#718096;font-size:.9rem}
.page{padding:1.5rem;max-width:960px;margin:0 auto}
.header{margin-bottom:1.25rem}
.header h1{font-size:1.35rem;font-weight:700;color:var(--text);display:flex;align-items:center;gap:.5rem}
.header p{font-size:.83rem;color:var(--muted);margin-top:.3rem}
.top-row{display:grid;grid-template-columns:auto 1fr;gap:1rem;margin-bottom:1.25rem;align-items:start}
.kpi-main{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:1.2rem;box-shadow:var(--shadow);min-width:180px}
.kpi-label{font-size:.75rem;color:var(--muted);margin-bottom:.25rem;display:flex;align-items:center;gap:.3rem}
.kpi-value{font-size:2rem;font-weight:700;color:var(--accent);line-height:1.1}
.kpi-value span{font-size:.95rem;font-weight:400;color:var(--muted)}
.kpi-sub{font-size:.75rem;color:var(--muted);margin-top:.3rem}
.seg-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:.8rem}
.seg-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:1rem;box-shadow:var(--shadow)}
.seg-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:.6rem}
.seg-name{font-size:.9rem;font-weight:600;color:var(--text)}
.risk-tag{font-size:.68rem;padding:.15rem .45rem;border-radius:4px;font-weight:600}
.risk-low{background:#d1fae5;color:#065f46}
.risk-mid{background:#fef3c7;color:#92400e}
.risk-high{background:#fee2e2;color:#991b1b}
.risk-vhigh{background:#fde8e8;color:#7b1c1c}
.seg-cnt{font-size:1.2rem;font-weight:700;color:var(--primary);margin-bottom:.6rem}
.seg-cnt span{font-size:.78rem;font-weight:400;color:var(--muted)}
.meta-row{display:flex;gap:.5rem;align-items:center;margin-bottom:.45rem;font-size:.78rem;color:var(--muted)}
.meta-row i{color:var(--primary);font-size:.85rem}
.prog-wrap{margin-top:.5rem}
.prog-label{display:flex;justify-content:space-between;font-size:.72rem;color:var(--muted);margin-bottom:.25rem}
.prog-bar{height:6px;background:#f0ede8;border-radius:4px;overflow:hidden}
.prog-fill{height:100%;border-radius:4px}
.bottom-row{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:1.2rem;box-shadow:var(--shadow);margin-top:1rem}
.section-title{font-size:.88rem;font-weight:600;color:var(--text);margin-bottom:.9rem;display:flex;align-items:center;gap:.4rem}
.section-title i{color:var(--primary)}
.chart-wrap{position:relative;height:180px}
@media(max-width:680px){.top-row{grid-template-columns:1fr}.seg-grid{grid-template-columns:1fr}}
</style>
<script>if(window.parent!==window)document.documentElement.classList.add("in-iframe");</script>
<style>.in-iframe nav{display:none!important;}</style>
<meta name="description" content="风险 -11.6% · 规模 +15.3%">
<meta property="og:title" content="客群分层策略 · 63.2万客户 · 演示" />
<meta property="og:description" content="风险 -11.6% · 规模 +15.3%" />
<meta property="og:type" content="website" />
<meta property="og:image" content="../../screenshot.png" />
<meta property="og:url" content="https://ezychen9306.github.io/portfolio/" />
<link rel="apple-touch-icon" sizes="180x180" href="../../assets/icons/apple-touch-icon.png">
<link rel="icon" type="image/png" sizes="32x32" href="../../assets/icons/favicon-32x32.png">
<link rel="icon" type="image/png" sizes="16x16" href="../../assets/icons/favicon-16x16.png">
<link rel="manifest" href="../../assets/icons/site.webmanifest">
</head>
<body>
<nav>
  <a href="../../index.html#portfolio" onclick="if(window.parent!==window){window.parent.closeModal();return false;}"><i class="ri-arrow-left-line"></i> 返回</a>
  <span>客群分层策略 · 差异化运营</span>
</nav>
<div class="page">
  <div class="header">
    <h1><i class="ri-user-3-line" style="color:var(--primary)"></i> 客群分层策略</h1>
    <p>4 客群精细化运营 &nbsp;·&nbsp; 风险差异化策略匹配 &nbsp;·&nbsp; 盈利性 +128.8%</p>
  </div>

  <div class="top-row">
    <div class="kpi-main">
      <div class="kpi-label"><i class="ri-team-line"></i> 总客户数</div>
      <div class="kpi-value">63.2<span>万</span></div>
      <div class="kpi-sub">4 个客群 · 7 周持续增长</div>
    </div>
    <div class="seg-grid" id="segGrid"></div>
  </div>

  <div class="bottom-row">
    <div class="section-title"><i class="ri-line-chart-line"></i> 7 周客群规模趋势</div>
    <div class="chart-wrap"><canvas id="trendChart"></canvas></div>
  </div>
</div>

<script>
const DATA = {
  segments:[
    {name:"高价值",cnt:120000,risk:0.021,util:0.78},
    {name:"标准",cnt:280000,risk:0.056,util:0.71},
    {name:"成长",cnt:190000,risk:0.089,util:0.65},
    {name:"高风险",cnt:42000,risk:0.125,util:0.45}
  ],
  trend:[68,70,73,74,76,78,80]
};

const riskTag = (r) => {
  if(r<0.03) return {cls:'risk-low',label:'低风险'};
  if(r<0.07) return {cls:'risk-mid',label:'中风险'};
  if(r<0.10) return {cls:'risk-high',label:'高风险'};
  return {cls:'risk-vhigh',label:'极高风险'};
};

const fillColor = (r) => {
  if(r<0.03) return '#38a169';
  if(r<0.07) return '#c9a227';
  return '#e53e3e';
};

document.addEventListener('DOMContentLoaded',()=>{
  const grid = document.getElementById('segGrid');
  DATA.segments.forEach(s=>{
    const tag = riskTag(s.risk);
    const utilPct = Math.round(s.util*100);
    grid.innerHTML += `
      <div class="seg-card">
        <div class="seg-header">
          <span class="seg-name">${s.name}客群</span>
          <span class="risk-tag ${tag.cls}">${tag.label}</span>
        </div>
        <div class="seg-cnt">${(s.cnt/10000).toFixed(1)}<span> 万人</span></div>
        <div class="meta-row"><i class="ri-shield-line"></i> 逾期率 ${(s.risk*100).toFixed(1)}%</div>
        <div class="prog-wrap">
          <div class="prog-label"><span>使用率</span><span>${utilPct}%</span></div>
          <div class="prog-bar"><div class="prog-fill" style="width:${utilPct}%;background:${fillColor(s.risk)}"></div></div>
        </div>
      </div>`;
  });

  const ctx = document.getElementById('trendChart').getContext('2d');
  const grad = ctx.createLinearGradient(0,0,0,160);
  grad.addColorStop(0,'rgba(107,142,159,.18)');
  grad.addColorStop(1,'rgba(107,142,159,.02)');
  new Chart(ctx,{
    type:'line',
    data:{
      labels:['W1','W2','W3','W4','W5','W6','W7'],
      datasets:[{
        label:'规模（万人）',
        data:DATA.trend,
        borderColor:'#6b8e9f',
        backgroundColor:grad,
        borderWidth:2.5,
        pointRadius:5,
        pointBackgroundColor:'#6b8e9f',
        fill:true,
        tension:.35
      }]
    },
    options:{
      responsive:true,maintainAspectRatio:false,
      plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>' '+c.parsed.y+'万人'}}},
      scales:{
        x:{grid:{color:'#f0ede8'},ticks:{font:{size:11}}},
        y:{grid:{color:'#f0ede8'},ticks:{font:{size:11}},min:60,max:85}
      }
    }
  });
});
</script>
</body>
</html>
