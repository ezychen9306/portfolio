<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>自动化周度监控 · 一键出图</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/remixicon@4.1.0/fonts/remixicon.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
:root{--bg:#f7f4ef;--card:#fff;--primary:#6b8e9f;--accent:#c9a227;--text:#4a5568;--muted:#718096;--border:#e8e4dc;--shadow:0 2px 8px rgba(0,0,0,.06)}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
nav{background:#fff;border-bottom:1px solid #e8e4dc;padding:.75rem 1.5rem;display:flex;align-items:center;gap:1rem;position:sticky;top:0;z-index:10}
nav a{display:inline-flex;align-items:center;gap:.4rem;color:#6b8e9f;text-decoration:none;font-weight:600;font-size:.9rem;padding:.3rem .7rem;border-radius:6px;border:1px solid #e8e4dc;transition:background .2s}
nav a:hover{background:#f7f4ef}
nav span{color:#718096;font-size:.9rem}
.page{padding:1.5rem;max-width:960px;margin:0 auto}
.header{margin-bottom:1.5rem}
.header h1{font-size:1.35rem;font-weight:700;color:var(--text);display:flex;align-items:center;gap:.5rem}
.header p{font-size:.83rem;color:var(--muted);margin-top:.3rem}
.kpi-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:1rem;margin-bottom:1.25rem}
.kpi-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:1.2rem;box-shadow:var(--shadow)}
.kpi-label{font-size:.75rem;color:var(--muted);margin-bottom:.35rem;display:flex;align-items:center;gap:.3rem}
.kpi-value{font-size:1.75rem;font-weight:700;color:var(--text);line-height:1.1}
.kpi-value span{font-size:.95rem;font-weight:400}
.kpi-badge{display:inline-block;font-size:.7rem;padding:.15rem .45rem;border-radius:4px;font-weight:600;margin-top:.3rem}
.badge-up{background:#fef3c7;color:#92400e}
.badge-down{background:#fee2e2;color:#991b1b}
.badge-ok{background:#d1fae5;color:#065f46}
.color-accent{color:var(--accent)}
.color-primary{color:var(--primary)}
.color-danger{color:#e53e3e}
.two-col{display:grid;grid-template-columns:1.5fr 1fr;gap:1rem}
.section{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:1.2rem;box-shadow:var(--shadow)}
.section-title{font-size:.88rem;font-weight:600;color:var(--text);margin-bottom:.9rem;display:flex;align-items:center;gap:.4rem}
.section-title i{color:var(--primary)}
.chart-wrap{position:relative;height:220px}
.alert-list{display:flex;flex-direction:column;gap:.65rem}
.alert-item{display:flex;align-items:flex-start;gap:.7rem;padding:.8rem .95rem;background:#fffbf0;border-left:3px solid #c9a227;border-radius:0 8px 8px 0}
.alert-icon{color:#c9a227;font-size:1rem;margin-top:.05rem;flex-shrink:0}
.alert-text{font-size:.83rem;color:var(--text);line-height:1.45}
@media(max-width:720px){.kpi-grid{grid-template-columns:repeat(2,1fr)}.two-col{grid-template-columns:1fr}}
</style>
<script>if(window.parent!==window)document.documentElement.classList.add("in-iframe");</script>
<style>.in-iframe nav{display:none!important;}</style>
<meta name="description" content="自动化周度监控 · 一键出图">
<meta property="og:title" content="自动化周度监控 · 一键出图 · 演示" />
<meta property="og:description" content="自动化周度监控 · 一键出图" />
<meta property="og:type" content="website" />
<meta property="og:image" content="../../screenshot.png" />
<meta property="og:url" content="https://ezychen9306.github.io/portfolio/" />
<link rel="apple-touch-icon" sizes="180x180" href="../../assets/icons/apple-touch-icon.png">
<link rel="icon" type="image/png" sizes="32x32" href="../../assets/icons/favicon-32x32.png">
<link rel="icon" type="image/png" sizes="16x16" href="../../assets/icons/favicon-16x16.png">
<link rel="manifest" href="../../assets/icons/site.webmanifest">
</head>
<body>
<nav>
  <a href="../../index.html#portfolio" onclick="if(window.parent!==window){window.parent.closeModal();return false;}"><i class="ri-arrow-left-line"></i> 返回</a>
  <span>自动化周度监控 · 一键出图</span>
</nav>
<div class="page">
  <div class="header">
    <h1><i class="ri-line-chart-line" style="color:var(--primary)"></i> 自动化周度监控</h1>
    <p>一键出图 &nbsp;·&nbsp; 本周关键指标快览 &nbsp;·&nbsp; 数据更新：2025-W32</p>
  </div>

  <div class="kpi-grid">
    <div class="kpi-card">
      <div class="kpi-label"><i class="ri-money-cny-circle-line"></i> 新批放款</div>
      <div class="kpi-value color-accent">3.6<span>亿</span></div>
      <span class="kpi-badge badge-up">↑ 2.9% WoW</span>
    </div>
    <div class="kpi-card">
      <div class="kpi-label"><i class="ri-percent-line"></i> 转化率</div>
      <div class="kpi-value color-primary">21.4<span>%</span></div>
      <span class="kpi-badge badge-down">↓ 0.8pp WoW</span>
    </div>
    <div class="kpi-card">
      <div class="kpi-label"><i class="ri-error-warning-line"></i> 30+ 逾期率</div>
      <div class="kpi-value color-danger">7.1<span>%</span></div>
      <span class="kpi-badge badge-down">↑ 0.3pp 需关注</span>
    </div>
    <div class="kpi-card">
      <div class="kpi-label"><i class="ri-funds-line"></i> ROI</div>
      <div class="kpi-value color-accent">17.6<span>%</span></div>
      <span class="kpi-badge badge-ok">达标</span>
    </div>
  </div>

  <div class="two-col">
    <div class="section">
      <div class="section-title"><i class="ri-line-chart-line"></i> 7 周新批放款趋势（亿）</div>
      <div class="chart-wrap"><canvas id="trendChart"></canvas></div>
    </div>
    <div class="section">
      <div class="section-title"><i class="ri-alarm-warning-line"></i> 预警告警</div>
      <div class="alert-list" id="alertList"></div>
    </div>
  </div>
</div>

<script>
const DATA = {
  summary:{kpi:[{n:"新批放款(亿)",v:3.6},{n:"转化率",v:0.214},{n:"30+ 逾期",v:0.071},{n:"ROI",v:0.176}]},
  trend:[3.1,3.3,3.0,3.4,3.5,3.7,3.6],
  alerts:["A 渠道转化下滑 3.2%","成长客群逾期率上升 0.6pp","模型服务 P95 延迟升高"]
};

document.addEventListener('DOMContentLoaded',()=>{
  const ctx = document.getElementById('trendChart').getContext('2d');
  new Chart(ctx,{
    type:'line',
    data:{
      labels:['W1','W2','W3','W4','W5','W6','W7'],
      datasets:[{
        label:'新批放款（亿）',
        data:DATA.trend,
        borderColor:'#6b8e9f',
        backgroundColor:'rgba(107,142,159,.13)',
        borderWidth:2.5,
        pointRadius:5,
        pointBackgroundColor:'#6b8e9f',
        fill:true,
        tension:.35
      }]
    },
    options:{
      responsive:true,maintainAspectRatio:false,
      plugins:{legend:{display:false},tooltip:{callbacks:{label:ctx=>' '+ctx.parsed.y+'亿'}}},
      scales:{
        x:{grid:{color:'#f0ede8'},ticks:{font:{size:11}}},
        y:{grid:{color:'#f0ede8'},ticks:{font:{size:11}},min:2.5,max:4.2}
      }
    }
  });

  const icons=['ri-arrow-down-line','ri-arrow-up-line','ri-time-line'];
  const list=document.getElementById('alertList');
  DATA.alerts.forEach((a,i)=>{
    const div=document.createElement('div');
    div.className='alert-item';
    div.innerHTML=`<i class="alert-icon ${icons[i]||'ri-error-warning-line'}"></i><span class="alert-text">${a}</span>`;
    list.appendChild(div);
  });
});
</script>
</body>
</html>
