<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>数据质量校验 · 自动校验 效率 +80%</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/remixicon@4.1.0/fonts/remixicon.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
:root{--bg:#f7f4ef;--card:#fff;--primary:#6b8e9f;--accent:#c9a227;--text:#4a5568;--muted:#718096;--border:#e8e4dc;--shadow:0 2px 8px rgba(0,0,0,.06)}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
nav{background:#fff;border-bottom:1px solid #e8e4dc;padding:.75rem 1.5rem;display:flex;align-items:center;gap:1rem;position:sticky;top:0;z-index:10}
nav a{display:inline-flex;align-items:center;gap:.4rem;color:#6b8e9f;text-decoration:none;font-weight:600;font-size:.9rem;padding:.3rem .7rem;border-radius:6px;border:1px solid #e8e4dc;transition:background .2s}
nav a:hover{background:#f7f4ef}
nav span{color:#718096;font-size:.9rem}
.page{padding:1.5rem;max-width:960px;margin:0 auto}
.header{margin-bottom:1.25rem}
.header h1{font-size:1.35rem;font-weight:700;color:var(--text);display:flex;align-items:center;gap:.5rem}
.header p{font-size:.83rem;color:var(--muted);margin-top:.3rem}
.kpi-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:1rem;margin-bottom:1.25rem}
.kpi-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:1.2rem;box-shadow:var(--shadow);display:flex;align-items:center;gap:1rem}
.kpi-icon{width:46px;height:46px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:1.3rem;flex-shrink:0}
.kpi-icon.blue{background:#e8f4f8;color:#6b8e9f}
.kpi-icon.orange{background:#fff3e0;color:#c9a227}
.kpi-label{font-size:.75rem;color:var(--muted);margin-bottom:.2rem}
.kpi-value{font-size:1.75rem;font-weight:700;line-height:1.1}
.kpi-value span{font-size:.95rem;font-weight:400}
.color-accent{color:var(--accent)}
.color-primary{color:var(--primary)}
.kpi-badge{display:inline-block;font-size:.7rem;padding:.15rem .4rem;border-radius:4px;font-weight:600;margin-top:.25rem}
.badge-green{background:#d1fae5;color:#065f46}
.badge-warn{background:#fef3c7;color:#92400e}
.three-col{display:grid;grid-template-columns:1fr 1fr 1fr;gap:1rem;margin-bottom:1rem}
.two-col{display:grid;grid-template-columns:1.2fr 1fr;gap:1rem}
.section{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:1.2rem;box-shadow:var(--shadow)}
.section-title{font-size:.88rem;font-weight:600;color:var(--text);margin-bottom:.9rem;display:flex;align-items:center;gap:.4rem}
.section-title i{color:var(--primary)}
.chart-wrap{position:relative;height:190px}
.issue-list{display:flex;flex-direction:column;gap:.6rem}
.issue-item{display:flex;align-items:flex-start;gap:.6rem;padding:.75rem .9rem;background:#fffbf0;border-left:3px solid #c9a227;border-radius:0 8px 8px 0}
.issue-icon{color:#c9a227;font-size:.95rem;margin-top:.05rem;flex-shrink:0}
.issue-text{font-size:.82rem;color:var(--text);line-height:1.4}
@media(max-width:720px){.kpi-grid{grid-template-columns:1fr}.three-col{grid-template-columns:1fr}.two-col{grid-template-columns:1fr}}
</style>
<script>if(window.parent!==window)document.documentElement.classList.add("in-iframe");</script>
<style>.in-iframe nav{display:none!important;}</style>
<meta name="description" content="自动校验 · 效率 +80%">
<meta property="og:title" content="数据质量校验 · 自动校验 效率 +80% · 演示" />
<meta property="og:description" content="自动校验 · 效率 +80%" />
<meta property="og:type" content="website" />
<meta property="og:image" content="../../screenshot.png" />
<meta property="og:url" content="https://ezychen9306.github.io/portfolio/" />
<link rel="apple-touch-icon" sizes="180x180" href="../../assets/icons/apple-touch-icon.png">
<link rel="icon" type="image/png" sizes="32x32" href="../../assets/icons/favicon-32x32.png">
<link rel="icon" type="image/png" sizes="16x16" href="../../assets/icons/favicon-16x16.png">
<link rel="manifest" href="../../assets/icons/site.webmanifest">
</head>
<body>
<nav>
  <a href="../../index.html#portfolio" onclick="if(window.parent!==window){window.parent.closeModal();return false;}"><i class="ri-arrow-left-line"></i> 返回</a>
  <span>自动校验 · 效率 +80%</span>
</nav>
<div class="page">
  <div class="header">
    <h1><i class="ri-shield-check-line" style="color:var(--primary)"></i> 数据质量校验</h1>
    <p>自动校验 &nbsp;·&nbsp; 效率 +80% &nbsp;·&nbsp; 4 项规则 · 多维度覆盖</p>
  </div>

  <div class="kpi-grid">
    <div class="kpi-card">
      <div class="kpi-icon blue"><i class="ri-medal-line"></i></div>
      <div>
        <div class="kpi-label">综合质量评分</div>
        <div class="kpi-value color-primary">94.75<span>分</span></div>
        <span class="kpi-badge badge-green">4 项均值</span>
      </div>
    </div>
    <div class="kpi-card">
      <div class="kpi-icon orange"><i class="ri-error-warning-line"></i></div>
      <div>
        <div class="kpi-label">活跃问题</div>
        <div class="kpi-value color-accent">3<span>个</span></div>
        <span class="kpi-badge badge-warn">需处理</span>
      </div>
    </div>
  </div>

  <div class="two-col">
    <div class="section">
      <div class="section-title"><i class="ri-bar-chart-horizontal-line"></i> 4 项校验结果</div>
      <div class="chart-wrap"><canvas id="checksChart"></canvas></div>
    </div>
    <div class="section">
      <div class="section-title"><i class="ri-line-chart-line"></i> 7 周质量趋势</div>
      <div class="chart-wrap"><canvas id="trendChart"></canvas></div>
    </div>
  </div>

  <div class="section" style="margin-top:1rem">
    <div class="section-title"><i class="ri-alarm-warning-line"></i> 质量问题列表</div>
    <div class="issue-list" id="issueList"></div>
  </div>
</div>

<script>
const DATA = {
  checks:[{n:"空值率",pass:98},{n:"唯一性",pass:96},{n:"枚举值",pass:92},{n:"时间连续",pass:95}],
  issues:["合同表少 213 条记录","贷后表字段 type 取值超范围 3 条","近 7 天 ETL 耗时增长 26%"],
  trend:[92,93,94,94,95,95,96]
};

document.addEventListener('DOMContentLoaded',()=>{
  // Checks bar
  const ctx1 = document.getElementById('checksChart').getContext('2d');
  new Chart(ctx1,{
    type:'bar',
    data:{
      labels:DATA.checks.map(c=>c.n),
      datasets:[{
        label:'通过率 %',
        data:DATA.checks.map(c=>c.pass),
        backgroundColor:DATA.checks.map(c=>c.pass>=95?'#6b8e9f':'#c9a227'),
        borderRadius:6,
        borderSkipped:false
      }]
    },
    options:{
      indexAxis:'y',
      responsive:true,maintainAspectRatio:false,
      plugins:{
        legend:{display:false},
        tooltip:{callbacks:{label:c=>' '+c.parsed.x+'%'}}
      },
      scales:{
        x:{grid:{color:'#f0ede8'},ticks:{font:{size:11}},min:88,max:100},
        y:{grid:{display:false},ticks:{font:{size:11}}}
      }
    }
  });

  // Trend
  const ctx2 = document.getElementById('trendChart').getContext('2d');
  const grad = ctx2.createLinearGradient(0,0,0,160);
  grad.addColorStop(0,'rgba(107,142,159,.18)');
  grad.addColorStop(1,'rgba(107,142,159,.02)');
  new Chart(ctx2,{
    type:'line',
    data:{
      labels:['W1','W2','W3','W4','W5','W6','W7'],
      datasets:[{
        label:'质量评分',
        data:DATA.trend,
        borderColor:'#6b8e9f',
        backgroundColor:grad,
        borderWidth:2.5,
        pointRadius:4,
        pointBackgroundColor:'#6b8e9f',
        fill:true,
        tension:.35
      }]
    },
    options:{
      responsive:true,maintainAspectRatio:false,
      plugins:{legend:{display:false}},
      scales:{
        x:{grid:{color:'#f0ede8'},ticks:{font:{size:11}}},
        y:{grid:{color:'#f0ede8'},ticks:{font:{size:11}},min:90,max:98}
      }
    }
  });

  // Issues
  const list = document.getElementById('issueList');
  const icons = ['ri-file-damage-line','ri-database-2-line','ri-time-line'];
  DATA.issues.forEach((issue, i)=>{
    const div = document.createElement('div');
    div.className = 'issue-item';
    div.innerHTML = `<i class="issue-icon ${icons[i]||'ri-error-warning-line'}"></i><span class="issue-text">${issue}</span>`;
    list.appendChild(div);
  });
});
</script>
</body>
</html>
