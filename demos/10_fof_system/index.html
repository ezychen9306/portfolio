<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>智能投顾系统（FOF） · AUM 8亿+ · 年化 12.5%</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/remixicon@4.1.0/fonts/remixicon.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
:root{--bg:#f7f4ef;--card:#fff;--primary:#6b8e9f;--accent:#c9a227;--text:#4a5568;--muted:#718096;--border:#e8e4dc;--shadow:0 2px 8px rgba(0,0,0,.06)}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
nav{background:#fff;border-bottom:1px solid #e8e4dc;padding:.75rem 1.5rem;display:flex;align-items:center;gap:1rem;position:sticky;top:0;z-index:10}
nav a{display:inline-flex;align-items:center;gap:.4rem;color:#6b8e9f;text-decoration:none;font-weight:600;font-size:.9rem;padding:.3rem .7rem;border-radius:6px;border:1px solid #e8e4dc;transition:background .2s}
nav a:hover{background:#f7f4ef}
nav span{color:#718096;font-size:.9rem}
.page{padding:1.5rem;max-width:960px;margin:0 auto}
.header{margin-bottom:1.5rem}
.header h1{font-size:1.35rem;font-weight:700;color:var(--text);display:flex;align-items:center;gap:.5rem}
.header p{font-size:.83rem;color:var(--muted);margin-top:.3rem}
.kpi-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:1rem;margin-bottom:1.25rem}
.kpi-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:1.2rem;box-shadow:var(--shadow)}
.kpi-label{font-size:.75rem;color:var(--muted);margin-bottom:.35rem;display:flex;align-items:center;gap:.3rem}
.kpi-value{font-size:1.75rem;font-weight:700;line-height:1.1}
.kpi-value span{font-size:.95rem;font-weight:400}
.color-accent{color:var(--accent)}
.color-primary{color:var(--primary)}
.color-green{color:#38a169}
.kpi-badge{display:inline-block;font-size:.7rem;padding:.15rem .45rem;border-radius:4px;font-weight:600;margin-top:.3rem}
.badge-up{background:#fef3c7;color:#92400e}
.badge-green{background:#d1fae5;color:#065f46}
.two-col{display:grid;grid-template-columns:1.6fr 1fr;gap:1rem}
.section{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:1.2rem;box-shadow:var(--shadow)}
.section-title{font-size:.88rem;font-weight:600;color:var(--text);margin-bottom:.9rem;display:flex;align-items:center;gap:.4rem}
.section-title i{color:var(--primary)}
.chart-wrap{position:relative;height:220px}
@media(max-width:700px){.kpi-grid{grid-template-columns:1fr}.two-col{grid-template-columns:1fr}}
</style>
<script>if(window.parent!==window)document.documentElement.classList.add("in-iframe");</script>
<style>.in-iframe nav{display:none!important;}</style>
<meta name="description" content="AUM 8 亿+ · 年化 12.5%">
<meta property="og:title" content="智能投顾系统（FOF） · AUM 8亿+ · 年化 12.5% · 演示" />
<meta property="og:description" content="AUM 8 亿+ · 年化 12.5%" />
<meta property="og:type" content="website" />
<meta property="og:image" content="../../screenshot.png" />
<meta property="og:url" content="https://ezychen9306.github.io/portfolio/" />
<link rel="apple-touch-icon" sizes="180x180" href="../../assets/icons/apple-touch-icon.png">
<link rel="icon" type="image/png" sizes="32x32" href="../../assets/icons/favicon-32x32.png">
<link rel="icon" type="image/png" sizes="16x16" href="../../assets/icons/favicon-16x16.png">
<link rel="manifest" href="../../assets/icons/site.webmanifest">
</head>
<body>
<nav>
  <a href="../../index.html#portfolio" onclick="if(window.parent!==window){window.parent.closeModal();return false;}"><i class="ri-arrow-left-line"></i> 返回</a>
  <span>AUM 8 亿+ · 年化 12.5%</span>
</nav>
<div class="page">
  <div class="header">
    <h1><i class="ri-stock-line" style="color:var(--accent)"></i> 智能投顾系统（FOF）</h1>
    <p>AUM 8 亿+ &nbsp;·&nbsp; 年化 12.5% &nbsp;·&nbsp; 风险分层配置 · 12 个月增长轨迹</p>
  </div>

  <div class="kpi-grid">
    <div class="kpi-card">
      <div class="kpi-label"><i class="ri-bank-line"></i> 当前 AUM</div>
      <div class="kpi-value color-accent">7.8<span>亿</span></div>
      <span class="kpi-badge badge-up">↑ 2025 年末目标</span>
    </div>
    <div class="kpi-card">
      <div class="kpi-label"><i class="ri-arrow-up-circle-line"></i> 全年增幅</div>
      <div class="kpi-value color-primary">+151.6<span>%</span></div>
      <span class="kpi-badge badge-up">3.1 → 7.8亿</span>
    </div>
    <div class="kpi-card">
      <div class="kpi-label"><i class="ri-funds-box-line"></i> 年化收益</div>
      <div class="kpi-value color-green">12.5<span>%</span></div>
      <span class="kpi-badge badge-green">稳健超额</span>
    </div>
  </div>

  <div class="two-col">
    <div class="section">
      <div class="section-title"><i class="ri-line-chart-line"></i> 12 个月 AUM 增长（亿）</div>
      <div class="chart-wrap"><canvas id="aumChart"></canvas></div>
    </div>
    <div class="section">
      <div class="section-title"><i class="ri-pie-chart-line"></i> 风险分布</div>
      <div class="chart-wrap"><canvas id="riskChart"></canvas></div>
    </div>
  </div>
</div>

<script>
const DATA = {
  aum:[3.1,3.4,3.8,4.2,4.6,5.1,5.5,5.9,6.3,6.8,7.2,7.8],
  risk:[{name:"低",v:0.42},{name:"中",v:0.38},{name:"高",v:0.2}]
};

document.addEventListener('DOMContentLoaded',()=>{
  // AUM line chart
  const ctx1 = document.getElementById('aumChart').getContext('2d');
  const grad = ctx1.createLinearGradient(0,0,0,200);
  grad.addColorStop(0,'rgba(201,162,39,.28)');
  grad.addColorStop(1,'rgba(201,162,39,.03)');
  new Chart(ctx1,{
    type:'line',
    data:{
      labels:['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'],
      datasets:[{
        label:'AUM（亿）',
        data:DATA.aum,
        borderColor:'#c9a227',
        backgroundColor:grad,
        borderWidth:2.5,
        pointRadius:4,
        pointBackgroundColor:'#c9a227',
        fill:true,
        tension:.35
      }]
    },
    options:{
      responsive:true,maintainAspectRatio:false,
      plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>' '+c.parsed.y+'亿'}}},
      scales:{
        x:{grid:{color:'#f0ede8'},ticks:{font:{size:10}}},
        y:{grid:{color:'#f0ede8'},ticks:{font:{size:11}},min:2.5,max:8.5}
      }
    }
  });

  // Risk donut
  const ctx2 = document.getElementById('riskChart').getContext('2d');
  new Chart(ctx2,{
    type:'doughnut',
    data:{
      labels:DATA.risk.map(r=>r.name+'风险'),
      datasets:[{
        data:DATA.risk.map(r=>Math.round(r.v*100)),
        backgroundColor:['#6b8e9f','#c9a227','#e07070'],
        borderWidth:2,
        borderColor:'#fff',
        hoverOffset:6
      }]
    },
    options:{
      responsive:true,maintainAspectRatio:false,
      cutout:'62%',
      plugins:{
        legend:{position:'bottom',labels:{font:{size:11},padding:10}},
        tooltip:{callbacks:{label:c=>` ${c.label}: ${c.parsed}%`}}
      }
    }
  });
});
</script>
</body>
</html>
