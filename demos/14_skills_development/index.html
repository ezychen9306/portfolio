<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Skills 技能开发 · 效率 +50% · 规范遵守 95%+</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/remixicon@4.1.0/fonts/remixicon.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
:root{--bg:#f7f4ef;--card:#fff;--primary:#6b8e9f;--accent:#c9a227;--text:#4a5568;--muted:#718096;--border:#e8e4dc;--shadow:0 2px 8px rgba(0,0,0,.06)}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
nav{background:#fff;border-bottom:1px solid #e8e4dc;padding:.75rem 1.5rem;display:flex;align-items:center;gap:1rem;position:sticky;top:0;z-index:10}
nav a{display:inline-flex;align-items:center;gap:.4rem;color:#6b8e9f;text-decoration:none;font-weight:600;font-size:.9rem;padding:.3rem .7rem;border-radius:6px;border:1px solid #e8e4dc;transition:background .2s}
nav a:hover{background:#f7f4ef}
nav span{color:#718096;font-size:.9rem}
.page{padding:1.5rem;max-width:960px;margin:0 auto}
.header{margin-bottom:1.25rem}
.header h1{font-size:1.35rem;font-weight:700;color:var(--text);display:flex;align-items:center;gap:.5rem}
.header p{font-size:.83rem;color:var(--muted);margin-top:.3rem}
.kpi-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:1rem;margin-bottom:1.25rem}
.kpi-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:1.2rem;box-shadow:var(--shadow)}
.kpi-label{font-size:.75rem;color:var(--muted);margin-bottom:.35rem;display:flex;align-items:center;gap:.3rem}
.kpi-value{font-size:1.75rem;font-weight:700;line-height:1.1}
.kpi-value span{font-size:.95rem;font-weight:400}
.color-accent{color:var(--accent)}
.color-primary{color:var(--primary)}
.kpi-badge{display:inline-block;font-size:.7rem;padding:.15rem .4rem;border-radius:4px;font-weight:600;margin-top:.3rem}
.badge-up{background:#fef3c7;color:#92400e}
.badge-green{background:#d1fae5;color:#065f46}
.main-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:1rem}
.section{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:1.2rem;box-shadow:var(--shadow)}
.section.span2{grid-column:span 2}
.section-title{font-size:.88rem;font-weight:600;color:var(--text);margin-bottom:.9rem;display:flex;align-items:center;gap:.4rem}
.section-title i{color:var(--primary)}
.chart-wrap{position:relative;height:200px}
.ring-wrap{display:flex;flex-direction:column;align-items:center;justify-content:center;height:200px;position:relative}
.ring-canvas-wrap{position:relative;width:160px;height:160px}
.ring-label{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center}
.ring-num{font-size:1.8rem;font-weight:700;color:var(--accent)}
.ring-sub{font-size:.72rem;color:var(--muted)}
@media(max-width:720px){.kpi-grid{grid-template-columns:1fr}.main-grid{grid-template-columns:1fr}.section.span2{grid-column:1}}
</style>
<script>if(window.parent!==window)document.documentElement.classList.add("in-iframe");</script>
<style>.in-iframe nav{display:none!important;}</style>
<meta name="description" content="效率 +50% · 规范遵守 95%+">
<meta property="og:title" content="Skills 技能开发 · 效率 +50% · 规范遵守 95%+ · 演示" />
<meta property="og:description" content="效率 +50% · 规范遵守 95%+" />
<meta property="og:type" content="website" />
<meta property="og:image" content="../../screenshot.png" />
<meta property="og:url" content="https://ezychen9306.github.io/portfolio/" />
<link rel="apple-touch-icon" sizes="180x180" href="../../assets/icons/apple-touch-icon.png">
<link rel="icon" type="image/png" sizes="32x32" href="../../assets/icons/favicon-32x32.png">
<link rel="icon" type="image/png" sizes="16x16" href="../../assets/icons/favicon-16x16.png">
<link rel="manifest" href="../../assets/icons/site.webmanifest">
</head>
<body>
<nav>
  <a href="../../index.html#portfolio" onclick="if(window.parent!==window){window.parent.closeModal();return false;}"><i class="ri-arrow-left-line"></i> 返回</a>
  <span>效率 +50% · 规范遵守 95%+</span>
</nav>
<div class="page">
  <div class="header">
    <h1><i class="ri-code-s-slash-line" style="color:var(--primary)"></i> Skills 技能开发</h1>
    <p>效率 +50% &nbsp;·&nbsp; 规范遵守 95%+ &nbsp;·&nbsp; 4 团队覆盖 · 持续迭代</p>
  </div>

  <div class="kpi-grid">
    <div class="kpi-card">
      <div class="kpi-label"><i class="ri-apps-line"></i> Skills 数量</div>
      <div class="kpi-value color-primary">30<span>个</span></div>
      <span class="kpi-badge badge-up">↑ 12→30 稳定增长</span>
    </div>
    <div class="kpi-card">
      <div class="kpi-label"><i class="ri-shield-check-line"></i> 规范遵守率</div>
      <div class="kpi-value color-accent">95<span>%</span></div>
      <span class="kpi-badge badge-green">超预期达标</span>
    </div>
    <div class="kpi-card">
      <div class="kpi-label"><i class="ri-team-line"></i> 覆盖团队</div>
      <div class="kpi-value color-primary">4<span>个</span></div>
      <span class="kpi-badge" style="background:#e8f4f8;color:#4a7a8a">全部门覆盖</span>
    </div>
  </div>

  <div class="main-grid">
    <div class="section span2">
      <div class="section-title"><i class="ri-line-chart-line"></i> 7 周 Skills 数量趋势（12→30）</div>
      <div class="chart-wrap"><canvas id="trendChart"></canvas></div>
    </div>
    <div class="section">
      <div class="section-title"><i class="ri-pie-chart-line"></i> 团队使用分布</div>
      <div class="chart-wrap"><canvas id="teamChart"></canvas></div>
    </div>
  </div>

  <div class="section" style="margin-top:1rem">
    <div class="section-title"><i class="ri-award-line"></i> 规范遵守率</div>
    <div class="ring-wrap">
      <div class="ring-canvas-wrap">
        <canvas id="ringChart"></canvas>
        <div class="ring-label">
          <div class="ring-num">95%</div>
          <div class="ring-sub">遵守率</div>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
const DATA = {
  trend:[12,14,18,20,23,26,30],
  compliance:0.95,
  teams:[{name:"风控",v:0.34},{name:"运营",v:0.28},{name:"产品",v:0.22},{name:"研发",v:0.16}]
};

document.addEventListener('DOMContentLoaded',()=>{
  // Trend line
  const ctx1 = document.getElementById('trendChart').getContext('2d');
  const grad = ctx1.createLinearGradient(0,0,0,180);
  grad.addColorStop(0,'rgba(107,142,159,.2)');
  grad.addColorStop(1,'rgba(107,142,159,.02)');
  new Chart(ctx1,{
    type:'line',
    data:{
      labels:['W1','W2','W3','W4','W5','W6','W7'],
      datasets:[{
        label:'Skills 数量',
        data:DATA.trend,
        borderColor:'#6b8e9f',
        backgroundColor:grad,
        borderWidth:2.5,
        pointRadius:5,
        pointBackgroundColor:'#6b8e9f',
        fill:true,
        tension:.35
      }]
    },
    options:{
      responsive:true,maintainAspectRatio:false,
      plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>' '+c.parsed.y+' 个'}}},
      scales:{
        x:{grid:{color:'#f0ede8'},ticks:{font:{size:11}}},
        y:{grid:{color:'#f0ede8'},ticks:{font:{size:11}},min:8,max:34}
      }
    }
  });

  // Team donut
  const ctx2 = document.getElementById('teamChart').getContext('2d');
  new Chart(ctx2,{
    type:'doughnut',
    data:{
      labels:DATA.teams.map(t=>t.name),
      datasets:[{
        data:DATA.teams.map(t=>Math.round(t.v*100)),
        backgroundColor:['#6b8e9f','#c9a227','#8fa9b5','#e0c875'],
        borderWidth:2,
        borderColor:'#fff',
        hoverOffset:6
      }]
    },
    options:{
      responsive:true,maintainAspectRatio:false,
      cutout:'58%',
      plugins:{
        legend:{position:'bottom',labels:{font:{size:10},padding:8}},
        tooltip:{callbacks:{label:c=>` ${c.label}: ${c.parsed}%`}}
      }
    }
  });

  // Compliance ring
  const ctx3 = document.getElementById('ringChart').getContext('2d');
  const pct = Math.round(DATA.compliance*100);
  new Chart(ctx3,{
    type:'doughnut',
    data:{
      datasets:[{
        data:[pct,100-pct],
        backgroundColor:['#c9a227','#f0ede8'],
        borderWidth:0,
        hoverOffset:0
      }]
    },
    options:{
      responsive:true,maintainAspectRatio:true,
      cutout:'72%',
      plugins:{legend:{display:false},tooltip:{enabled:false}}
    }
  });
});
</script>
</body>
</html>
