<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>知识库 Agent · RAG 检索 准确率 92.5%</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/remixicon@4.1.0/fonts/remixicon.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
:root{--bg:#f7f4ef;--card:#fff;--primary:#6b8e9f;--accent:#c9a227;--text:#4a5568;--muted:#718096;--border:#e8e4dc;--shadow:0 2px 8px rgba(0,0,0,.06)}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
nav{background:#fff;border-bottom:1px solid #e8e4dc;padding:.75rem 1.5rem;display:flex;align-items:center;gap:1rem;position:sticky;top:0;z-index:10}
nav a{display:inline-flex;align-items:center;gap:.4rem;color:#6b8e9f;text-decoration:none;font-weight:600;font-size:.9rem;padding:.3rem .7rem;border-radius:6px;border:1px solid #e8e4dc;transition:background .2s}
nav a:hover{background:#f7f4ef}
nav span{color:#718096;font-size:.9rem}
.page{padding:1.5rem;max-width:960px;margin:0 auto}
.header{margin-bottom:1.25rem}
.header h1{font-size:1.35rem;font-weight:700;color:var(--text);display:flex;align-items:center;gap:.5rem}
.header p{font-size:.83rem;color:var(--muted);margin-top:.3rem}
.kpi-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:1rem;margin-bottom:1.25rem}
.kpi-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:1.2rem;box-shadow:var(--shadow)}
.kpi-label{font-size:.75rem;color:var(--muted);margin-bottom:.35rem;display:flex;align-items:center;gap:.3rem}
.kpi-value{font-size:1.75rem;font-weight:700;line-height:1.1}
.kpi-value span{font-size:.95rem;font-weight:400}
.color-accent{color:var(--accent)}
.color-primary{color:var(--primary)}
.color-green{color:#38a169}
.kpi-badge{display:inline-block;font-size:.7rem;padding:.15rem .4rem;border-radius:4px;font-weight:600;margin-top:.3rem;background:#d1fae5;color:#065f46}
.two-col{display:grid;grid-template-columns:1.5fr 1fr;gap:1rem}
.section{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:1.2rem;box-shadow:var(--shadow)}
.section-title{font-size:.88rem;font-weight:600;color:var(--text);margin-bottom:.9rem;display:flex;align-items:center;gap:.4rem}
.section-title i{color:var(--primary)}
.chart-wrap{position:relative;height:210px}
.latency-list{display:flex;flex-direction:column;gap:.9rem;padding-top:.2rem}
.latency-row{}
.latency-head{display:flex;justify-content:space-between;font-size:.82rem;margin-bottom:.3rem}
.latency-name{font-weight:600;color:var(--text)}
.latency-val{color:var(--muted)}
.latency-bar{height:8px;background:#f0ede8;border-radius:5px;overflow:hidden}
.latency-fill{height:100%;border-radius:5px}
@media(max-width:700px){.kpi-grid{grid-template-columns:1fr}.two-col{grid-template-columns:1fr}}
</style>
<script>if(window.parent!==window)document.documentElement.classList.add("in-iframe");</script>
<style>.in-iframe nav{display:none!important;}</style>
<meta name="description" content="RAG 检索 · 准确率 92.5%">
<meta property="og:title" content="知识库 Agent · RAG 检索 准确率 92.5% · 演示" />
<meta property="og:description" content="RAG 检索 · 准确率 92.5%" />
<meta property="og:type" content="website" />
<meta property="og:image" content="../../screenshot.png" />
<meta property="og:url" content="https://ezychen9306.github.io/portfolio/" />
<link rel="apple-touch-icon" sizes="180x180" href="../../assets/icons/apple-touch-icon.png">
<link rel="icon" type="image/png" sizes="32x32" href="../../assets/icons/favicon-32x32.png">
<link rel="icon" type="image/png" sizes="16x16" href="../../assets/icons/favicon-16x16.png">
<link rel="manifest" href="../../assets/icons/site.webmanifest">
</head>
<body>
<nav>
  <a href="../../index.html#portfolio" onclick="if(window.parent!==window){window.parent.closeModal();return false;}"><i class="ri-arrow-left-line"></i> 返回</a>
  <span>RAG 检索 · 准确率 92.5%</span>
</nav>
<div class="page">
  <div class="header">
    <h1><i class="ri-search-eye-line" style="color:var(--primary)"></i> 知识库 Agent</h1>
    <p>RAG 检索 &nbsp;·&nbsp; 准确率 92.5% &nbsp;·&nbsp; 1.26万文档 · 毫秒级响应</p>
  </div>

  <div class="kpi-grid">
    <div class="kpi-card">
      <div class="kpi-label"><i class="ri-checkbox-circle-line"></i> 准确率</div>
      <div class="kpi-value color-green">88<span>%</span></div>
      <span class="kpi-badge">W7 最新值</span>
    </div>
    <div class="kpi-card">
      <div class="kpi-label"><i class="ri-file-text-line"></i> 文档总量</div>
      <div class="kpi-value color-accent">1.26<span>万</span></div>
      <span class="kpi-badge" style="background:#fef9e7;color:#92400e">持续增长</span>
    </div>
    <div class="kpi-card">
      <div class="kpi-label"><i class="ri-time-line"></i> P50 延迟</div>
      <div class="kpi-value color-primary">0.45<span>s</span></div>
      <span class="kpi-badge">快速响应</span>
    </div>
  </div>

  <div class="two-col">
    <div class="section">
      <div class="section-title"><i class="ri-line-chart-line"></i> 7 周准确率趋势（72%→88%）</div>
      <div class="chart-wrap"><canvas id="accChart"></canvas></div>
    </div>
    <div class="section">
      <div class="section-title"><i class="ri-speed-line"></i> 延迟分布（秒）</div>
      <div class="latency-list" id="latencyList"></div>
    </div>
  </div>
</div>

<script>
const DATA = {
  trend:[0.72,0.75,0.78,0.80,0.83,0.86,0.88],
  latency:[{name:"P50",v:0.45},{name:"P95",v:1.2},{name:"P99",v:2.4}],
  docs:12600
};

document.addEventListener('DOMContentLoaded',()=>{
  // Accuracy trend
  const ctx = document.getElementById('accChart').getContext('2d');
  const grad = ctx.createLinearGradient(0,0,0,190);
  grad.addColorStop(0,'rgba(56,161,105,.2)');
  grad.addColorStop(1,'rgba(56,161,105,.02)');
  new Chart(ctx,{
    type:'line',
    data:{
      labels:['W1','W2','W3','W4','W5','W6','W7'],
      datasets:[{
        label:'准确率',
        data:DATA.trend.map(v=>Math.round(v*100)),
        borderColor:'#38a169',
        backgroundColor:grad,
        borderWidth:2.5,
        pointRadius:5,
        pointBackgroundColor:'#38a169',
        fill:true,
        tension:.35
      }]
    },
    options:{
      responsive:true,maintainAspectRatio:false,
      plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>' '+c.parsed.y+'%'}}},
      scales:{
        x:{grid:{color:'#f0ede8'},ticks:{font:{size:11}}},
        y:{grid:{color:'#f0ede8'},ticks:{font:{size:11},callback:v=>v+'%'},min:68,max:92}
      }
    }
  });

  // Latency bars
  const maxV = Math.max(...DATA.latency.map(l=>l.v));
  const colors = ['#6b8e9f','#c9a227','#e07070'];
  const list = document.getElementById('latencyList');
  DATA.latency.forEach((l,i)=>{
    const pct = Math.round(l.v/maxV*100);
    const div = document.createElement('div');
    div.className = 'latency-row';
    div.innerHTML = `
      <div class="latency-head">
        <span class="latency-name">${l.name}</span>
        <span class="latency-val">${l.v.toFixed(2)}s</span>
      </div>
      <div class="latency-bar">
        <div class="latency-fill" style="width:${pct}%;background:${colors[i]}"></div>
      </div>`;
    list.appendChild(div);
  });
});
</script>
</body>
</html>
